rtk_node:
  ros__parameters:

    # ==================== 串口配置 ====================
    serial_port: "/dev/ttyUSB0"     # RTK 串口设备路径 (常见: /dev/ttyS3, /dev/ttyUSB0)
    baud_rate: 115200             # 串口波特率 (与 RTK 设备配置一致)
    publish_rate: 10.0            # 话题发布频率 (Hz)
    outdoor_odom_topic: "/outdoor/odom"  # 统一室外位姿输出, 供导航模块直接订阅

    # ==================== 天线安装偏移 ====================
    # 天线基线方向与狗头朝向的夹角 (度, RTK 北向顺时针坐标系下)
    # 校准方法: 让狗面朝某个已知方向 (如正北=0°, 正东=90°, 正南=180°, 正西=270°)
    #   offset = 狗实际朝向(度) - RTK报告值(度)
    # 例如: 狗朝正西(270°), RTK报 0° → offset = 270
    antenna_heading_offset_deg: -270.0

    # ==================== 坐标参考点 ====================
    # !! 必须与 nav_planner/config/slam_nav_params.yaml 中的
    # !! outdoor.ref_latitude / outdoor.ref_longitude 保持完全一致 !!
    # 两处任意修改一处都会导致 RTK 定位坐标与 nav_planner 航点坐标系偏移
    reference.jinan_lat: 36.66111    # 参考点纬度 (WGS84 度)
    reference.jinan_lon: 117.01665   # 参考点经度 (WGS84 度)
