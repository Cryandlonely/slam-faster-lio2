# 对外通讯桥接节点参数
bridge_node:
  ros__parameters:
    # TCP 服务器端口 (外部客户端连接此端口)
    tcp_port: 9090

    # PCD 传输专用端口 (与控制端口分离)
    pcd_tcp_port: 9091

    # 状态推送频率 (Hz)
    status_rate: 5.0

    # SLAM 里程计话题 (需与 FAST_LIO 输出一致)
    slam_odom_topic: "/Odometry"

    # 实时点云文件绝对路径，与 robosenseAiry.yaml 中 ROOT_DIR+realtime_trans_rel_path 一致
    trans_pcd_rel_path: "/home/lonely/slam/slam-faster-lio2/src/fastlio/src/FAST_LIO_Airy_ROS2-main/src/fast_lio_robosenseAiry/PCD/transPCD/trans.pcd"

    # PCD 分片传输单包最大字节数
    trans_chunk_bytes: 65536

    # ==================== 节点生命周期管理 ====================
    # ROS2 工作区路径 (用于子进程 source setup.bash, 留空则继承当前环境)
    # 注意: 不同机器路径不同, 留空时子进程继承父进程已 source 的环境 (推荐)
    ros2_workspace: ""

    # 建图 launch 包名和 launch 文件名
    mapping_launch_pkg: "fast_lio_robosense"
    mapping_launch_file: "mapping_robosense_airy.launch.py"

    # 纯建图模式的定位话题 (FAST-LIO /Odometry)
    indoor_mapping_odom_topic: "/Odometry"

    # 室外 RTK 定位话题
    outdoor_odom_topic: "/outdoor/odom"
