/global_localization:
    ros__parameters:
        enable_global_search: false       # true=全局搜索(任意点启动), false=原点启动
        search_step: 3.0                 # 全局搜索网格步长 (m)
        map_voxel_size: 0.3              # 地图降采样更细，ICP匹配更精确
        scan_voxel_size: 0.3             # 扫描降采样更细
        freq_localization: 5.0           # 定位频率 1→5Hz，快速纠正漂移
        localization_th: 0.7             # 降低阈值防止运动时匹配失败
        fov: 6.283185307179586           # 2*pi, radian
        fov_far: 100.0

/transform_fusion:
    ros__parameters:
        freq_pub_localization: 50.0

/global_map_publisher:
    ros__parameters:
        map_file_path: "/home/lonely/slam/slam-faster-lio2/src/location/PCD/scans.pcd"
        interval: 5 # publish interval in seconds

/**:
    ros__parameters:
        map_file_path: "/home/lonely/slam/slam-faster-lio2/src/location/PCD/scans.pcd"
        feature_extract_enable: false
        point_filter_num: 1              # 保留所有点，建图/定位更密集
        max_iteration: 5                 # EKF迭代次数 3→5，精度更高
        filter_size_surf: 0.3            # 扫描降采样更细 0.5→0.3
        filter_size_map: 0.3             # 地图降采样更细 0.5→0.3
        cube_side_length: 1000.0
        runtime_pos_log_enable: false

        common:
            lid_topic:  "/livox/lidar"
            imu_topic:  "/livox/imu"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            lidar_type: 1
            scan_line:  4
            blind: 0.5
            timestamp_unit: 3
            scan_rate: 10

        mapping:
            acc_cov: 0.001               # IMU噪声协方差收紧 0.01→0.001
            gyr_cov: 0.001               # 陀螺仪同上
            b_acc_cov: 0.00001           # bias协方差收紧
            b_gyr_cov: 0.00001
            fov_degree:    360.0
            det_range:     100.0
            extrinsic_est_en:  false     # MID360外参固定，关闭在线估计防飘
            extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
            extrinsic_R: [ 1., 0., 0.,
                            0., 1., 0.,
                            0., 0., 1.]

        publish:
            path_en: true
            effect_map_en: false
            map_en: true
            scan_publish_en:  true
            dense_publish_en: false
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: false
            interval: -1
            realtime_trans_save_en: true
            realtime_trans_interval_sec: 1.0
            realtime_trans_rel_path: "PCD/transPCD/trans.pcd"