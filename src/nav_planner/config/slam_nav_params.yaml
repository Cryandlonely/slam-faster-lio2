# SLAM 导航规划节点参数配置
# 注意: 运行时的定位源切换 (室内建图/室内定位/室外RTK) 均通过 bridge 模块动态控制
#       本文件只配置启动默认值和固定参数

slam_nav_node:
  ros__parameters:

    # ==================== 启动默认值 ====================
    nav:
      mode: "slam"                 # 启动时默认模式 (运行时由 bridge/start_mapping 等命令切换)

    # ==================== SLAM 定位源配置 ====================
    slam:
      odom_topic: "/Odometry"        # 启动时默认订阅话题 (运行时由 bridge 动态切换)
      map_frame: "map"
      base_frame: "base_link"
      use_tf_pose: true              # 通过 TF (map→base_link) 获取底盘位姿

    # ==================== 室外坐标转换参考点 ====================
    # (室外导航时将经纬度转换为本地坐标所用, 需与 RTK 包配置一致)
    outdoor:
      odom_topic: "/outdoor/odom"
      ref_latitude: 36.66111
      ref_longitude: 117.01665

    # ==================== 规划参数 ====================
    planning:
      use_astar: true                # 启动时默认用 A* (室外模式下 bridge 会强制切为直线规划)
      map_topic: "map"
      path_resolution: 0.05          # 路径点间距 (m)
      target_speed: 2.0              # 默认目标速度 (m/s)
      slow_down_dist: 1.0            # 减速区距离 (m), 0.0 = 禁用减速
      min_speed: 0.1                # 减速区最低速度 (m/s)
      obstacle_inflate: 7            # 障碍物膨胀格数 (安全裕量=格数×0.05m=0.35m)
      occupied_thresh: 65            # 栅格占用阈值

    # ==================== 跟踪参数 ====================
    tracking:
      lookahead_distance: 0.6
      min_lookahead: 0.2
      max_lookahead: 2.0
      lookahead_gain: 0.8
      goal_tolerance: 0.15           # 到达判定阈值 (m)
      heading_tolerance: 0.15        # 航向到达阈值 (rad, ~8.6°)
      max_linear_x: 2.0              # 最大前进速度 (m/s)
      max_linear_y: 0.5              # 最大横移速度 (m/s)
      max_angular_velocity: 1.0      # 最大角速度 (rad/s)
      heading_kp: 1.5
      cte_kp: 1.0
      cmd_filter_alpha: 0.3
      heading_align_threshold: 30.0 # 航向对齐阈值 (度, 超过此角度则先旋转对齐再前进)

    # ==================== 控制频率 ====================
    control:
      rate: 20.0                     # Hz

    # ==================== SDK 接口 ====================
    sdk:
      max_vx: 2.0
      max_vy: 2.0
      max_yaw_rate: 1.0
      default_mode: 3                # 默认模式 (3=站立)
      enable_posture_fields: false

    # ==================== 调试 ====================
    debug:
      status_rate: 2.0               # Hz
