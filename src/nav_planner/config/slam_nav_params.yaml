# SLAM 导航规划节点参数配置 — 室外GPS履带车模式

slam_nav_node:
  ros__parameters:

    nav:
      mode: "gps"

    # RTK 室外定位源
    outdoor:
      odom_topic: "/outdoor/odom"
      ref_latitude: 36.66111
      ref_longitude: 117.01665

    # SLAM 定位源 (备用, GPS模式不启用)
    slam:
      odom_topic: "/Odometry"
      map_frame: "map"
      base_frame: "body"

    # 规划参数
    planning:
      use_astar: false               # 室外直线规划
      path_resolution: 0.5           # 路径点间距 (m)
      target_speed: 1.5              # 目标速度 (m/s)
      slow_down_dist: 4.0            # 终点减速区距离 (m)
      min_speed: 0.2                 # 减速区最低速度 (m/s)

    # 跟踪参数
    tracking:
      lookahead_distance: 0.6
      min_lookahead: 0.2
      max_lookahead: 2.0
      lookahead_gain: 0.3
      goal_tolerance: 0.5            # 到达判定阈值 (m)
      heading_tolerance: 180.0       # 到达后不对齐朝向
      max_linear_x: 1.5              # 最大前进速度 (m/s)
      max_angular_velocity: 1.0      # 最大角速度 (rad/s)
      heading_kp: 0.8
      cte_kp: 0.3
      cmd_filter_alpha: 0.6
      heading_align_threshold: 15.0  # 起步导向对齐阈值 (度)
      max_accel: 1.0                 # 最大加速度 (m/s²); <=0 禁用
      corner_min_speed: 0.1          # 转弯最低速度 (m/s); 0=禁用

    control:
      rate: 10.0                     # 控制频率 (Hz)

    # SDK 接口
    sdk:
      max_vx: 1.5
      max_vy: 2.0
      max_yaw_rate: 1.0

    # 动态避障
    obstacle:
      enable: true
      lidar_topic: "/livox/lidar"
      lidar_frame: "livox_frame"
      z_min: 0.15
      z_max: 2.0
      fov_half_deg: 90.0
      dynamic_ttl: 3.0
      replan_lookahead: 3.0
      replan_cooldown: 2.0
      lidar_subsample: 5
      corridor_width: 0.6
      gps_avoidance: true
      detour_lateral: 1.5
      detour_forward: 1.5

    debug:
      status_rate: 10.0
