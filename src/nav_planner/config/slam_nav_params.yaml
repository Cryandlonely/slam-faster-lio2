# SLAM 导航规划节点参数配置 — 室外GPS万向轮底盘模式
# 基于 207_ws nav_planner_params.yaml 重写

slam_nav_node:
  ros__parameters:

    # ---- 定位源 ----
    odom_topic: "/outdoor/odom"    # RTK+INS 融合里程计话题

    # ---- GPS 参考原点 (局部坐标系原点) ----
    reference:
      latitude: 36.66111
      longitude: 117.01665

    # ---- 坐标系 ----
    frame:
      map: "map"
      base: "body"

    # ---- 规划参数 ----
    planning:
      path_resolution: 0.5    # 路径点间距 (m), GPS模式适当放大
      target_speed: 1.5       # 默认目标速度 (m/s)
      slow_down_dist: 1.5     # 减速区距离 (m); 到达 goal_tolerance 边界时速度约 0.53 m/s, 不会蠕行
      min_speed: 0.2         # 减速区最低速度 (m/s)

    # ---- 跟踪参数 (GPS精度 ±0.3~0.5m 适配) ----
    tracking:
      lookahead_distance: 1.2         # 前视距离基础值 (m)
      min_lookahead: 0.5              # 最小前视距离 (m)
      max_lookahead: 5.0              # 最大前视距离 (m)
      lookahead_gain: 1.0             # 速度增益
      goal_tolerance: 0.5             # 到达判定阈值 (m), GPS精度适配
      heading_tolerance: 15.0        # 最终朝向阈值 (度), 180=不对齐
      max_linear_x: 1.5               # 最大前进速度 (m/s)
      max_linear_y: 0.0               # 最大侧移速度 (m/s), 履带车无横向移动
      max_angular_velocity: 1.0      # 最大角速度 (rad/s)
      heading_kp: 1.0                 # 航向 P 控制增益
      cte_kp: 0.3                     # 横向跟踪误差增益 (降低避免 GPS 噪声引起蛇形)
      cte_dead_zone: 0.3              # CTE 死区 (m); 应 ≥ GPS 定位精度, 防噪声触发纠偏
      cmd_filter_alpha: 0.3           # 低通滤波系数 (0.3响应快)
      heading_align_threshold: 15.0   # 起步航向对齐阈值 (度)

    # ---- 控制频率 ----
    control:
      rate: 10.0

    # ---- SDK 接口 ----
    sdk:
      max_vx: 1.5
      max_vy: 0.0        # 履带车无横向移动
      max_yaw_rate: 1.0

    # ---- 调试 ----
    debug:
      status_rate: 10.0