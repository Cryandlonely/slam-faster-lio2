# SLAM 导航规划节点参数配置 — 室外GPS万向轮底盘模式
# 基于 207_ws nav_planner_params.yaml 重写

slam_nav_node:
  ros__parameters:

    # ---- 定位源 ----
    odom_topic: "/outdoor/odom"    # RTK+INS 融合里程计话题

    # ---- GPS 参考原点 (局部坐标系原点) ----
    reference:
      latitude: 36.66111
      longitude: 117.01665

    # ---- 坐标系 ----
    frame:
      map: "map"
      base: "body"

    # ---- 规划参数 ----
    planning:
      path_resolution: 0.5    # 路径点间距 (m), GPS模式适当放大
      target_speed: 1.5       # 默认目标速度 (m/s), 降速提升跟踪稳定性
      slow_down_dist: 1.5     # 减速区距离 (m); 到达 goal_tolerance 边界时速度约 0.53 m/s, 不会蠕行
      min_speed: 0.2         # 减速区最低速度 (m/s)

    # ---- 跟踪参数 (单点GPS实测: 95%误差42.6cm, 强漂移噪声) ----
    tracking:
      lookahead_distance: 2.0         # 前视距离基础值 (m), 增大以跨越定位漂移范围
      min_lookahead: 1.5              # 最小前视距离 (m), 不能小于定位漂移幅度
      max_lookahead: 8.0              # 最大前视距离 (m)
      lookahead_gain: 1.0             # 速度增益
      goal_tolerance: 1.0             # 到达判定阈值 (m), 单点GPS实测95%误差×2.5
      heading_tolerance: 15.0        # 最终朝向阈值 (度), 180=不对齐
      max_linear_x: 1.5               # 最大前进速度 (m/s)
      max_linear_y: 0.0               # 最大侧移速度 (m/s), 履带车无横向移动
      max_angular_velocity: 1.2      # 最大角速度 (rad/s)
      heading_kp: 1.2                 # 航向 P 控制增益, 降低防止漂移引起来回摆动
      cte_kp: 0.25                    # 横向跟踪误差增益, 漂移噪声强, 不宜过大
      cte_dead_zone: 0.65             # CTE 死区 (m); 实测95%误差×1.5=0.64m
      cmd_filter_alpha: 0.10          # 低通滤波系数, 漂移为低频应尽量平滑输出
      heading_align_threshold: 15.0   # 起步航向对齐阈值 (度)

    # ---- 控制频率 ----
    control:
      rate: 5.0    # 履带车响应慢，5Hz 与 RTK 发布率一致

    # ---- SDK 接口 ----
    sdk:
      max_vx: 1.5
      max_vy: 0.0        # 履带车无横向移动
      max_yaw_rate: 1.2

    # ---- 调试 ----
    debug:
      status_rate: 3.0