rtk_node:
  ros__parameters:

    # ==================== 串口配置 ====================
    serial_port: "/dev/ttyACM4"     # RTK 串口设备路径 (常见: /dev/ttyS3, /dev/ttyUSB0)
    baud_rate: 115200             # 串口波特率 (与 RTK 设备配置一致)
    publish_rate: 10.0            # 话题发布频率 (Hz); 位置5Hz够用但航向转向时需10Hz
    outdoor_odom_topic: "/outdoor/odom"  # 统一室外位姿输出, 供导航模块直接订阅

    # ==================== 天线安装偏移 ====================
    # 天线基线方向与狗头朝向的夹角 (度, RTK 原始坐标系下)
    # 新协议约定 (顺时针自正东): 0=正东, 90=正南, 180=正西, 270=正北
    # 校准方法:
    #   offset = 狗实际朝向(协议值) - RTK报告值(度)
    # 示例: 狗朝正东时 RTK报 0° → offset = 0
    #       狗朝正北时 RTK报 0° → offset = 270 (或 -90)
    antenna_heading_offset_deg: 0.0

    # ==================== 坐标参考点 ====================
    # !! 必须与 nav_planner/config/slam_nav_params.yaml 中的
    # !! outdoor.ref_latitude / outdoor.ref_longitude 保持完全一致 !!
    # 两处任意修改一处都会导致 RTK 定位坐标与 nav_planner 航点坐标系偏移
    reference.jinan_lat: 36.66111    # 参考点纬度 (WGS84 度)
    reference.jinan_lon: 117.01665   # 参考点经度 (WGS84 度)

    # ==================== EKF IMU 融合 ====================
    imu_topic: "/vru/imu_raw"           # VRU IMU 话题, 用于 200Hz EKF 预测步
    chassis_feedback_topic: "/chassis/feedback"  # 底盘真实轮速, 替换 GPS 差分 vx
